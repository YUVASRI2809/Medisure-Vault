<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - MediSure Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo" style="background: #f3e8ff;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
                    </svg>
                </div>
                <h1 class="auth-title">Patient Registration</h1>
                <p class="auth-subtitle">Create your secure prescription account</p>
            </div>

            <div
                style="background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;padding:1rem;border-radius:0.5rem;margin-bottom:1.5rem;font-size:0.875rem;">
                As a patient, you can securely access your prescriptions and share them with authorized pharmacies.
            </div>

            <!-- Flash message banner -->
            <div id="flashMessage" style="display:none;"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" class="form-input" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="username" class="form-label">Username *</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="janedoe">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password *</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Minimum 8 characters">
                    <!-- strength bar injected here by auth.js -->
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                        placeholder="Re-enter password">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg">Register</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/patient-login">Login here</a></p>
                <p><a href="/">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script>
        const form = document.getElementById('registerForm');
        const fullName = document.getElementById('fullName');
        const username = document.getElementById('username');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');

        // Real-time blur validation
        fullName.addEventListener('blur', () => {
            !fullName.value.trim() ? setFieldError(fullName, 'Full name is required') : clearFieldError(fullName);
        });
        fullName.addEventListener('input', () => clearFieldError(fullName));

        username.addEventListener('blur', () => {
            const err = validateUsername(username.value.trim());
            err ? setFieldError(username, err) : clearFieldError(username);
        });
        username.addEventListener('input', () => clearFieldError(username));

        email.addEventListener('blur', () => {
            const err = validateEmail(email.value.trim());
            err ? setFieldError(email, err) : clearFieldError(email);
        });
        email.addEventListener('input', () => clearFieldError(email));

        // Password strength meter on input
        password.addEventListener('input', () => {
            renderStrengthBar(password);
            clearFieldError(password);
            // Live confirm match check
            if (confirm.value) {
                const err = validateConfirmPassword(password.value, confirm.value);
                err ? setFieldError(confirm, err) : clearFieldError(confirm);
            }
        });
        password.addEventListener('blur', () => {
            const err = validatePassword(password.value);
            err ? setFieldError(password, err) : clearFieldError(password);
        });

        confirm.addEventListener('input', () => {
            const err = validateConfirmPassword(password.value, confirm.value);
            err ? setFieldError(confirm, err) : clearFieldError(confirm);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Full validation pass
            let valid = true;
            if (!fullName.value.trim()) { setFieldError(fullName, 'Full name is required'); valid = false; }
            const uErr = validateUsername(username.value.trim());
            if (uErr) { setFieldError(username, uErr); valid = false; }
            const eErr = validateEmail(email.value.trim());
            if (eErr) { setFieldError(email, eErr); valid = false; }
            const pErr = validatePassword(password.value);
            if (pErr) { setFieldError(password, pErr); valid = false; }
            const cErr = validateConfirmPassword(password.value, confirm.value);
            if (cErr) { setFieldError(confirm, cErr); valid = false; }
            if (!valid) {
                flashMessage('Please fix the errors above before submitting.', 'warning');
                return;
            }

            setLoading(submitBtn, true, 'Register');

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        role: 'PATIENT',
                        full_name: fullName.value.trim(),
                        username: username.value.trim(),
                        email: email.value.trim(),
                        password: password.value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    flashMessage('Registration successful! Redirecting to login...', 'success');
                    form.reset();
                    setTimeout(() => { window.location.href = '/patient-login'; }, 2000);
                } else {
                    flashMessage(data.error || 'Registration failed. Please try again.', 'error');
                    setLoading(submitBtn, false, 'Register');
                }
            } catch {
                flashMessage('Network error. Please check your connection.', 'error');
                setLoading(submitBtn, false, 'Register');
            }
        });
    </script>
</body>

</html>
