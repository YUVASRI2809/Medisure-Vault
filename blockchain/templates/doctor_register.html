<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Registration - MediSure Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1e6fd9" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="auth-title">Doctor Registration</h1>
                <p class="auth-subtitle">Join MediSure Vault as a Medical Professional</p>
            </div>
            
            <form id="register-form">
                <h3 style="margin-bottom: 1rem; font-size: 1.125rem; color: #374151;">Account Information</h3>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username *</label>
                    <input type="text" id="username" name="username" class="form-input" required 
                           placeholder="Choose a unique username">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" id="email" name="email" class="form-input" required 
                           placeholder="your.email@hospital.com">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password *</label>
                    <input type="password" id="password" name="password" class="form-input" required 
                           placeholder="Minimum 8 characters">
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirm Password *</label>
                    <input type="password" id="confirm-password" name="confirm_password" class="form-input" required 
                           placeholder="Re-enter your password">
                </div>

                <h3 style="margin-bottom: 1rem; margin-top: 1.5rem; font-size: 1.125rem; color: #374151;">Personal Information</h3>

                <div class="form-group">
                    <label for="full-name" class="form-label">Full Name *</label>
                    <input type="text" id="full-name" name="full_name" class="form-input" required 
                           placeholder="Dr. John Smith">
                </div>

                <h3 style="margin-bottom: 1rem; margin-top: 1.5rem; font-size: 1.125rem; color: #374151;">Professional Credentials</h3>

                <div class="form-group">
                    <label for="license-number" class="form-label">Medical License Number *</label>
                    <input type="text" id="license-number" name="license_number" class="form-input" required 
                           placeholder="e.g., MD123456">
                </div>

                <div class="form-group">
                    <label for="specialization" class="form-label">Specialization *</label>
                    <select id="specialization" name="specialization" class="form-input" required>
                        <option value="">Select your specialization</option>
                        <option value="General Practice">General Practice</option>
                        <option value="Internal Medicine">Internal Medicine</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Orthopedics">Orthopedics</option>
                        <option value="Psychiatry">Psychiatry</option>
                        <option value="Surgery">Surgery</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hospital" class="form-label">Hospital/Clinic Name *</label>
                    <input type="text" id="hospital" name="hospital" class="form-input" required 
                           placeholder="Enter your hospital or clinic name">
                </div>

                <div class="form-group">
                    <label for="years-experience" class="form-label">Years of Experience</label>
                    <input type="number" id="years-experience" name="years_experience" class="form-input" min="0" 
                           placeholder="e.g., 5">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Register as Doctor</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('auth.authority_login') }}">Login here</a></p>
                <p><a href="{{ url_for('landing') }}">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                alert('❌ Passwords do not match!');
                return;
            }

            if (password.length < 8) {
                alert('❌ Password must be at least 8 characters long!');
                return;
            }
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.role = 'DOCTOR';
            delete data.confirm_password;
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ Registration successful! Please login.');
                    window.location.href = '/authority-login';
                } else {
                    alert(`❌ Registration failed: ${result.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('❌ Registration failed. Please try again.');
            }
        });
    </script>
</body>
</html>
