<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Login - MediSure Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1e6fd9" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h1 class="auth-title">Healthcare Professional Login</h1>
                <p class="auth-subtitle">Access your secure medical dashboard</p>
            </div>

            <!-- Flash message banner -->
            <div id="flashMessage" style="display:none;"></div>

            <form id="authorityLoginForm" novalidate>
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input"
                        placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account?
                    <a href="/doctor-register">Register as Doctor</a> |
                    <a href="/pharmacist-register">Register as Pharmacist</a>
                </p>
                <p style="margin-top: 1rem;"><a href="/">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script>
        const form = document.getElementById('authorityLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');

        usernameInput.addEventListener('blur', () => {
            const err = validateUsername(usernameInput.value.trim());
            err ? setFieldError(usernameInput, err) : clearFieldError(usernameInput);
        });
        usernameInput.addEventListener('input', () => clearFieldError(usernameInput));

        passwordInput.addEventListener('blur', () => {
            if (!passwordInput.value) setFieldError(passwordInput, 'Password is required');
            else clearFieldError(passwordInput);
        });
        passwordInput.addEventListener('input', () => clearFieldError(passwordInput));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            let valid = true;
            const uErr = validateUsername(username);
            if (uErr) { setFieldError(usernameInput, uErr); valid = false; }
            if (!password) { setFieldError(passwordInput, 'Password is required'); valid = false; }
            if (!valid) return;

            setLoading(submitBtn, true, 'Sign In');

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.user.role !== 'PATIENT') {
                        flashMessage('Login successful! Redirecting...', 'success');
                        setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
                    } else {
                        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
                        flashMessage('Access denied. This portal is for healthcare professionals only.', 'error');
                        setLoading(submitBtn, false, 'Sign In');
                    }
                } else {
                    flashMessage(data.error || 'Invalid credentials. Please try again.', 'error');
                    setLoading(submitBtn, false, 'Sign In');
                }
            } catch {
                flashMessage('Network error. Please check your connection.', 'error');
                setLoading(submitBtn, false, 'Sign In');
            }
        });
    </script>
</body>

</html>
